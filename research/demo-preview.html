<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Graph Preview Demo</title>
    <style>
      body {
        margin: 0;
        font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2328;
        background: linear-gradient(135deg, #f8fafc, #eef7f3);
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 28px;
      }

      .panel {
        border: 1px solid #d7e2dc;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 36px rgba(27, 31, 36, 0.08);
        padding: 22px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 26px;
      }

      .tag {
        display: inline-flex;
        border-radius: 999px;
        background: #e8f5f1;
        color: #08745f;
        padding: 5px 9px;
        font-size: 12px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <span class="tag">HTML demo</span>
        <h1>Graph node preview</h1>
        <p>This file verifies that graph nodes can open HTML documents inside the docked preview panel.</p>
        <p>The iframe is sandboxed, so the app can render the document without giving it broad page privileges.</p>
      </section>
    </main>
  </body>
</html>
